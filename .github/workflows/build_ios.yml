name: Build and Release iOS IPA

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Flutter iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          cd mobile_app
          flutter pub get

      - name: Build iOS (No Codesign)
        run: |
          cd mobile_app
          flutter build ios --release --no-codesign 2>&1 || (echo "=== BUILD FAILED - XCODE LOG ===" && cat ios/Pods/build/*.log 2>/dev/null || true; exit 1)

      - name: Package IPA
        run: |
          # Buscar Runner.app en las posibles rutas de build
          APP_PATH=""
          for dir in "mobile_app/build/ios/iphoneos" "mobile_app/build/ios/Release-iphoneos" "mobile_app/build/ios/Debug-iphoneos"; do
            if [ -d "$dir/Runner.app" ]; then
              APP_PATH="$dir"
              break
            fi
          done
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No se encontro Runner.app en ninguna ruta de build"
            find mobile_app/build/ios -name "Runner.app" -type d 2>/dev/null || true
            exit 1
          fi
          echo "Runner.app encontrado en: $APP_PATH"
          cd "$APP_PATH"
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r "$GITHUB_WORKSPACE/mobile_app/ios/Runner.ipa" Payload
          ls -la "$GITHUB_WORKSPACE/mobile_app/ios/Runner.ipa"

      - name: Generate Build Info
        run: |
          echo "# NeoCamo Monitor iOS - Build Info" > BUILD_INFO.md
          echo "" >> BUILD_INFO.md
          echo "**Fecha de compilación:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> BUILD_INFO.md
          echo "**Commit:** ${{ github.sha }}" >> BUILD_INFO.md
          echo "**Rama:** ${{ github.ref_name }}" >> BUILD_INFO.md
          echo "" >> BUILD_INFO.md
          echo "## Cómo instalar este IPA" >> BUILD_INFO.md
          echo "" >> BUILD_INFO.md
          echo "Este IPA está compilado sin firma de código (--no-codesign)." >> BUILD_INFO.md
          echo "Para instalarlo en tu iPhone necesitas una de estas opciones:" >> BUILD_INFO.md
          echo "" >> BUILD_INFO.md
          echo "### Opción 1: AltStore (Recomendado)" >> BUILD_INFO.md
          echo "1. Descarga AltServer en tu PC: https://altstore.io" >> BUILD_INFO.md
          echo "2. Conecta tu iPhone por USB" >> BUILD_INFO.md
          echo "3. Instala AltStore en tu iPhone desde AltServer" >> BUILD_INFO.md
          echo "4. Abre AltStore en tu iPhone y selecciona el archivo .ipa" >> BUILD_INFO.md
          echo "" >> BUILD_INFO.md
          echo "### Opción 2: Sideloadly" >> BUILD_INFO.md
          echo "1. Descarga Sideloadly: https://sideloadly.io" >> BUILD_INFO.md
          echo "2. Conecta tu iPhone por USB" >> BUILD_INFO.md
          echo "3. Arrastra el archivo .ipa a Sideloadly" >> BUILD_INFO.md
          echo "4. Ingresa tu Apple ID" >> BUILD_INFO.md
          echo "5. Sideloadly firmará e instalará la app automáticamente" >> BUILD_INFO.md
          echo "" >> BUILD_INFO.md
          echo "> ⚠️ **Nota:** Las apps instaladas con cuenta gratuita de Apple expiran cada 7 días." >> BUILD_INFO.md
          echo "> Necesitarás reinstalar la app cada semana a menos que tengas una cuenta de desarrollador paga." >> BUILD_INFO.md

      - name: Upload IPA as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeoCamo-iOS-IPA
          path: mobile_app/ios/Runner.ipa
          retention-days: 90

      - name: Upload Build Info
        uses: actions/upload-artifact@v4
        with:
          name: Build-Info
          path: BUILD_INFO.md
          retention-days: 90

      - name: Create Release
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.5.0-${{ github.run_number }}
          name: NeoCamo Monitor v2.5.0 (Build ${{ github.run_number }})
          body_path: BUILD_INFO.md
          files: |
            mobile_app/ios/Runner.ipa
          draft: false
          prerelease: false
