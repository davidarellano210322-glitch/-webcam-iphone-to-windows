name: Build iOS App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Flutter iOS (No Codesign)
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: |
          cd mobile_app
          flutter pub get

      - name: Build iOS Workspace
        run: |
          cd mobile_app
          flutter build ios --no-codesign

      - name: Archive Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Runner-iOS
          path: mobile_app/build/ios/iphoneos
