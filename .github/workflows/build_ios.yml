name: Build and Push iOS IPA

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Flutter iOS (No Codesign)
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.3'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          cd mobile_app
          flutter pub get

      - name: Build iOS Workspace
        run: |
          cd mobile_app
          flutter build ios --no-codesign

      - name: Package IPA
        run: |
          cd mobile_app/build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ../../../../ios/Runner.ipa Payload

      - name: Commit and Push IPA
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ios/Runner.ipa
          git commit -m "chore: update compiled Runner.ipa [skip ci]" || echo "No changes to commit"
          git push

      - name: Archive Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Runner-iOS
          path: mobile_app/build/ios/iphoneos
